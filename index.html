<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarthak | Professional Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* --- MODERN LOGIN OVERLAY --- */
        .overlay {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            z-index: 2000;
        }

        .glass-container {
            width: 90%;
            max-width: 420px;
            padding: 50px 40px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7);
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            color: white;
            font-weight: 800;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(2, 6, 23, 1);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        /* --- MAIN PORTFOLIO --- */
        .portfolio-header {
            padding: 100px 20px 60px;
            text-align: center;
        }

        .container { max-width: 1240px; margin: 0 auto; padding: 0 30px 100px; }
        
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 40px;
        }

        /* --- 16:9 CARDS WITH HOVER OVERLAY --- */
        .portfolio-card {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .thumbnail-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            position: relative;
        }

        .thumbnail-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* The Hover Overlay */
        .hover-overlay {
            position: absolute;
            inset: 0;
            background: rgba(99, 102, 241, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            backdrop-filter: blur(4px);
        }

        .portfolio-card:hover .hover-overlay { opacity: 1; }
        .portfolio-card:hover img { transform: scale(1.1); }

        .overlay-text {
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            transform: translateY(20px);
            transition: 0.4s ease;
        }

        .portfolio-card:hover .overlay-text { transform: translateY(0); }

        .card-info {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-info h3 { margin: 0; font-size: 1.2rem; font-weight: 600; letter-spacing: -0.5px; }

        /* --- ADMIN PANEL --- */
        .admin-box {
            background: linear-gradient(to bottom right, rgba(99, 102, 241, 0.1), transparent);
            border: 1px dashed var(--accent);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 60px;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-delete:hover { background: #ef4444; color: white; }

        @media (max-width: 600px) {
            .portfolio-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="glass-container">
            <div class="logo-icon">S</div>
            <h1 style="margin:0 0 10px">Secure Access</h1>
            <p style="color:var(--text-dim); margin-bottom:30px">Enter your credentials to view the portfolio.</p>
            
            <div id="user-area">
                <input type="password" id="user-pass" placeholder="Portfolio Password">
                <button class="btn-primary" onclick="checkAccess()">Enter Showcase</button>
            </div>

            <div style="margin:25px 0; border-top:1px solid var(--border); position:relative">
                <span style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); background:#0f172a; padding:0 15px; font-size:12px; color:var(--text-dim)">ADMIN</span>
            </div>
            
            <button style="background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:10px; border-radius:10px; width:100%; cursor:pointer" onclick="document.getElementById('admin-login').classList.toggle('hidden')">Admin Login</button>
            
            <div id="admin-login" class="hidden" style="margin-top:20px">
                <input type="password" id="admin-pass" placeholder="Sarthak12">
                <button class="btn-primary" style="background:#10b981" onclick="checkAdmin()">Authenticate</button>
            </div>
        </div>
    </div>

    <main id="main-content" class="hidden">
        <header class="portfolio-header">
            <h1 id="view-title" style="font-size:3rem; margin:0; letter-spacing:-2px">Creative Portfolio</h1>
            <p style="color:var(--text-dim); font-size:1.1rem">Crafting digital excellence through minimalist design.</p>
            <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:var(--text-dim); cursor:pointer; text-decoration:underline">Logout Session</button>
        </header>

        <div class="container">
            <section id="admin-panel" class="hidden">
                <div class="admin-box">
                    <h3 style="margin-top:0">Post New Work</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:15px">
                        <input type="text" id="proj-title" placeholder="Project Title">
                        <input type="text" id="proj-img" placeholder="Image URL (16:9)">
                        <button class="btn-primary" style="width:150px" onclick="addProject()">Publish</button>
                    </div>
                </div>
            </section>

            <div class="portfolio-grid" id="portfolio-grid"></div>
        </div>
    </main>

    <script>
        let adminMode = false;
        let data = JSON.parse(localStorage.getItem('port_v1')) || [
            { id: 1, title: "Modernist Interior", img: "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=1200" },
            { id: 2, title: "UI Components 2026", img: "https://images.unsplash.com/photo-1614332287897-cdc485fa562d?q=80&w=1200" }
        ];

        function checkAccess() {
            if(document.getElementById('user-pass').value === "Portfolio") start(false);
            else alert("Wrong password");
        }

        function checkAdmin() {
            if(document.getElementById('admin-pass').value === "Sarthak12") start(true);
            else alert("Invalid Admin key");
        }

        function start(isAdmin) {
            adminMode = isAdmin;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden');
            if(isAdmin) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('view-title').innerText = "Admin Dashboard";
            }
            render();
        }

        function render() {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = data.map(p => `
                <div class="portfolio-card">
                    <div class="thumbnail-wrapper">
                        <img src="${p.img}" alt="${p.title}">
                        <div class="hover-overlay">
                            <span class="overlay-text">Explore Case Study</span>
                        </div>
                    </div>
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        ${adminMode ? `<button class="btn-delete" onclick="remove(${p.id})">Delete</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function addProject() {
            const t = document.getElementById('proj-title').value;
            const i = document.getElementById('proj-img').value;
            if(t && i) {
                data.push({ id: Date.now(), title: t, img: i });
                update();
                document.getElementById('proj-title').value = '';
                document.getElementById('proj-img').value = '';
            }
        }

        function remove(id) {
            if(confirm("Delete this project?")) {
                data = data.filter(p => p.id !== id);
                update();
            }
        }

        function update() {
            localStorage.setItem('port_v1', JSON.stringify(data));
            render();
        }
    </script>
</body>
</html>
