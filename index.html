<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarthak Portfolio | Premium Designs</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #d946ef;
            --accent-glow: rgba(217, 70, 239, 0.4);
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* --- LOGIN OVERLAY --- */
        .overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #2e1065 0%, #020617 100%);
            z-index: 2000; padding: 20px;
        }

        .glass-container {
            width: 100%; max-width: 420px;
            padding: 50px 35px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(25px); border: 1px solid var(--border);
            border-radius: 32px; text-align: center;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8);
        }

        /* LOGO FIX */
        .logo-img {
            width: 100px; height: 100px;
            border-radius: 50%; border: 3px solid var(--accent);
            margin: 0 auto 25px; object-fit: cover;
            box-shadow: 0 0 25px var(--accent-glow);
            display: block;
        }

        input {
            width: 100%; padding: 16px; background: rgba(2, 6, 23, 0.7);
            border: 1px solid var(--border); border-radius: 14px;
            color: white; margin-bottom: 15px; outline: none;
        }

        .btn-primary {
            width: 100%; padding: 18px; background: var(--accent);
            color: white; border: none; border-radius: 14px;
            font-weight: 700; cursor: pointer;
        }

        /* --- SHOWCASE --- */
        .portfolio-header { padding: 80px 20px 40px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px 100px; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }

        .portfolio-card {
            background: var(--card-bg); border-radius: 24px;
            border: 1px solid var(--border); overflow: hidden;
            cursor: pointer; opacity: 0; transform: translateY(30px);
        }

        .portfolio-card.reveal { opacity: 1; transform: translateY(0); }

        .thumbnail-wrapper { width: 100%; aspect-ratio: 16 / 9; overflow: hidden; position: relative; }
        .thumbnail-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .hover-overlay {
            position: absolute; inset: 0; background: rgba(217, 70, 239, 0.7);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; backdrop-filter: blur(5px);
        }

        .portfolio-card:hover .hover-overlay { opacity: 1; }
        .card-info { padding: 20px; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(15px); display: flex; justify-content: center;
            align-items: center; z-index: 9999; padding: 20px;
        }

        .modal-content {
            background: #0f172a; width: 100%; max-width: 800px;
            border-radius: 32px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; position: relative;
        }

        .modal-text { padding: 35px; }
        .order-btn {
            display: inline-block; background: var(--success);
            color: white; padding: 14px 30px; border-radius: 50px;
            text-decoration: none; font-weight: 800; margin-top: 20px;
        }

        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; color: white; cursor: pointer; }

        @media (max-width: 768px) { .portfolio-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="glass-container">
            <img src="1000015890.jpg" class="logo-img" alt="Sarthak Logo" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
            <h1 class="login-title">Sarthak Portfolio</h1>
            <p style="color: var(--text-dim); margin-bottom: 25px;">Click below to visit Sarthak's showcase.</p>
            
            <input type="password" id="user-pass" placeholder="Password (Portfolio)">
            <button class="btn-primary" onclick="checkAccess()">Open Showcase</button>

            <div style="margin:25px 0; border-top:1px solid var(--border); position:relative">
                <span style="font-size:10px; color:var(--text-dim); position:absolute; top:-10px; left:50%; transform:translateX(-50%); background:#0d1425; padding:0 10px;">ADMIN</span>
            </div>
            
            <button style="background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:10px; border-radius:12px; width:100%; cursor:pointer;" onclick="document.getElementById('admin-login').classList.toggle('hidden')">Staff Portal</button>
            
            <div id="admin-login" class="hidden" style="margin-top:10px">
                <input type="password" id="admin-pass" placeholder="Admin PIN">
                <button class="btn-primary" style="background:#8b5cf6" onclick="checkAdmin()">Login Admin</button>
            </div>
        </div>
    </div>

    <main id="main-content" class="hidden">
        <header class="portfolio-header">
            <h1 style="font-size:3rem; font-weight:800; letter-spacing:-2px">Showcase Gallery</h1>
            <p style="color:var(--text-dim);">Premium visuals designed by Sarthak</p>
        </header>

        <div class="container">
            <div class="portfolio-grid" id="portfolio-grid"></div>
        </div>
    </main>

    <div id="projectModal" class="modal-overlay hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="thumbnail-wrapper">
                <img id="modalImg" src="" alt="">
            </div>
            <div class="modal-text">
                <h2 id="modalTitle">Work Preview</h2>
                <p style="color: var(--text-dim); margin-top: 8px;">High-conversion design optimized for visibility.</p>
                <a id="orderLink" href="https://t.me/SensieSarthak" target="_blank" class="order-btn">🚀 ORDER THIS DESIGN</a>
            </div>
        </div>
    </div>

    <script>
        let adminMode = false;
        let data = JSON.parse(localStorage.getItem('sarthak_v9')) || [
            { id: 1, title: "Sample Design 1", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200" },
            { id: 2, title: "Sample Design 2", img: "https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1200" }
        ];

        // FIXED PASSWORD LOGIC
        function checkAccess() {
            const userInput = document.getElementById('user-pass').value.toLowerCase().trim();
            if (userInput === "portfolio") {
                start(false);
            } else {
                alert("Incorrect Password! Try 'portfolio'");
            }
        }

        function checkAdmin() {
            const adminInput = document.getElementById('admin-pass').value.trim();
            if (adminInput === "Sarthak12") {
                start(true);
            } else {
                alert("Admin Access Denied");
            }
        }

        function start(isAdmin) {
            adminMode = isAdmin;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden');
            render();
            handleScroll();
        }

        function render() {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = data.map(p => `
                <div class="portfolio-card" onclick="openProject('${p.title}', '${p.img}')">
                    <div class="thumbnail-wrapper">
                        <img src="${p.img}" alt="${p.title}" onerror="this.src='https://via.placeholder.com/600x337?text=Image+Missing'">
                        <div class="hover-overlay"><span style="color:white; font-weight:800; border:2px solid white; padding:8px 18px; border-radius:50px">PREVIEW</span></div>
                    </div>
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        ${adminMode ? `<button style="color:#ef4444; background:none; border:none; cursor:pointer;" onclick="event.stopPropagation(); remove(${p.id})">Delete</button>` : ''}
                    </div>
                </div>
            `).join('');
            setTimeout(handleScroll, 100);
        }

        function handleScroll() {
            const cards = document.querySelectorAll('.portfolio-card');
            cards.forEach(card => {
                if(card.getBoundingClientRect().top < window.innerHeight - 50) {
                    card.classList.add('reveal');
                }
            });
        }
        window.addEventListener('scroll', handleScroll);

        function openProject(title, img) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalImg').src = img;
            document.getElementById('orderLink').href = `https://t.me/SensieSarthak?text=Hi Sarthak, I saw your "${title}" design and want to order!`;
            document.getElementById('projectModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('projectModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function remove(id) {
            if(confirm("Delete item?")) {
                data = data.filter(p => p.id !== id);
                localStorage.setItem('sarthak_v9', JSON.stringify(data));
                render();
            }
        }
    </script>
</body>
</html>
