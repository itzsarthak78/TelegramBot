<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarthak | Creative Studio</title>
    <link href="https://static.wikia.nocookie.net/shingekinokyojin/images/0/0a/Levi_Ackermann_%28Anime%29_character_image_%28854%29.png/revision/latest?cb=20231106070611:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff007a; 
            --secondary: #7000ff; 
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #2e1065 0%, #050505 80%);
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- LUXURY LOGIN --- */
        .overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; padding: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
        }

        .glass-container {
            width: 100%; max-width: 400px;
            padding: 40px; background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 40px; text-align: center;
        }

        .anime-logo {
            width: 120px; height: 120px;
            border-radius: 30px; border: 2px solid var(--primary);
            margin: 0 auto 20px; object-fit: cover;
            box-shadow: 0 0 30px rgba(255, 0, 122, 0.3);
            transform: rotate(-3deg);
        }

        input {
            width: 100%; padding: 18px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 18px;
            color: white; margin-bottom: 15px; outline: none;
        }

        .btn-main {
            width: 100%; padding: 18px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 18px;
            font-weight: 800; cursor: pointer; letter-spacing: 1px;
        }

        /* --- LOGOUT BUTTON STYLE --- */
        .logout-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 12px;
            color: var(--text); font-weight: 600; cursor: pointer;
            font-size: 0.8rem; z-index: 100;
        }
        .logout-btn:hover { background: var(--primary); border-color: var(--primary); }

        /* --- MAIN UI --- */
        .header { padding: 100px 20px 60px; text-align: center; position: relative; }
        .header h1 { font-size: 3.5rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -3px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; }

        .admin-panel {
            background: rgba(255,255,255,0.03); border: 1px dashed var(--secondary);
            padding: 30px; border-radius: 30px; margin-bottom: 60px;
        }

        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }

        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 30px; overflow: hidden; opacity: 0; transform: translateY(20px);
        }

        .card.show { opacity: 1; transform: translateY(0); }

        .img-box { width: 100%; aspect-ratio: 16/9; overflow: hidden; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 25px; display: flex; justify-content: space-between; align-items: center; }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); display: flex; justify-content: center;
            align-items: center; z-index: 3000; padding: 20px;
        }

        .modal-inner {
            background: #0a0a0a; width: 100%; max-width: 850px;
            border-radius: 40px; border: 1px solid var(--glass-border);
            overflow: hidden; position: relative;
        }

        .order-btn {
            display: inline-block; background: var(--primary); color: white;
            padding: 16px 40px; border-radius: 50px; text-decoration: none;
            font-weight: 800; margin-top: 20px;
        }

        .close { position: absolute; top: 30px; right: 30px; font-size: 40px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div id="login-screen" class="overlay">
        <div class="glass-container">
            <img src="https://i.pinimg.com/736x/8f/1a/f1/8f1af127566141443477196020617300.jpg" class="anime-logo" alt="Sarthak Studio">
            <h2 style="font-size: 2rem; margin-bottom: 5px; font-weight: 800;">Sarthak Studio</h2>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Premium Visuals & Motion Design</p>
            
            <input type="password" id="pass" placeholder="Enter Access Key">
            <button class="btn-main" onclick="verify()">Unlock Gallery</button>
            
            <p style="margin-top: 20px; font-size: 12px; color: var(--text-dim); cursor: pointer;" onclick="toggleAdmin()">Staff Access Only</p>
            <div id="admin-inputs" class="hidden" style="margin-top: 15px;">
                <input type="password" id="a-pass" placeholder="Admin Secret">
                <button class="btn-main" style="background: var(--secondary);" onclick="verifyAdmin()">Login Staff</button>
            </div>
        </div>
    </div>

    <main id="main-ui" class="hidden">
        <button class="logout-btn" onclick="logout()">Log Out</button>

        <div class="header">
            <h1>Featured Works</h1>
            <p style="color: var(--text-dim); font-size: 1.1rem; margin-top: 10px;">Curated high-performance designs by Sarthak</p>
        </div>

        <div class="container">
            <div id="admin-tools" class="admin-panel hidden">
                <h3 style="margin-bottom: 20px; color: var(--primary);">Add New Masterpiece</h3>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <input type="text" id="new-title" placeholder="Project Name" style="flex: 1; margin-bottom: 0;">
                    <input type="text" id="new-url" placeholder="Direct Image URL" style="flex: 1; margin-bottom: 0;">
                    <button class="btn-main" style="width: auto; padding: 0 40px;" onclick="upload()">Publish</button>
                </div>
            </div>

            <div class="portfolio-grid" id="grid"></div>
        </div>
    </main>

    <div id="modal-view" class="modal hidden" onclick="closeMe()">
        <div class="modal-inner" onclick="event.stopPropagation()">
            <div class="img-box"><img id="m-img" src="" alt=""></div>
            <div style="padding: 40px;">
                <h2 id="m-title" style="font-size: 2.2rem; margin-bottom: 10px;">Project</h2>
                <a id="m-link" href="https://t.me/SensieSarthak" target="_blank" class="order-btn">🚀 ORDER SIMILAR DESIGN</a>
            </div>
        </div>
        <span class="close">&times;</span>
    </div>

    <script>
        let isStaff = false;
        let works = JSON.parse(localStorage.getItem('sarthak_final_final')) || [
            { id: 1, name: "Neon Cyberpunk", img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1200" },
            { id: 2, name: "Minimalist Flow", img: "https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?q=80&w=1200" }
        ];

        function verify() {
            if(document.getElementById('pass').value.toLowerCase() === "portfolio") load(false);
            else alert("Key Incorrect");
        }

        function toggleAdmin() { document.getElementById('admin-inputs').classList.toggle('hidden'); }

        function verifyAdmin() {
            if(document.getElementById('a-pass').value === "Sarthak12") load(true);
            else alert("Denied");
        }

        function load(admin) {
            isStaff = admin;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            if(admin) document.getElementById('admin-tools').classList.remove('hidden');
            draw();
        }

        // LOGOUT FUNCTION
        function logout() {
            document.getElementById('main-ui').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('pass').value = '';
            document.getElementById('a-pass').value = '';
            isStaff = false;
        }

        function draw() {
            const grid = document.getElementById('grid');
            grid.innerHTML = works.map(w => `
                <div class="card" onclick="view('${w.name}', '${w.img}')">
                    <div class="img-box"><img src="${w.img}"></div>
                    <div class="card-body">
                        <h3>${w.name}</h3>
                        ${isStaff ? `<button style="color:var(--primary); background:none; border:none; font-weight:800; cursor:pointer;" onclick="event.stopPropagation(); del(${w.id})">Remove</button>` : ''}
                    </div>
                </div>
            `).join('');
            setTimeout(() => {
                document.querySelectorAll('.card').forEach((c, i) => {
                    setTimeout(() => c.classList.add('show'), i * 100);
                });
            }, 100);
        }

        function upload() {
            const n = document.getElementById('new-title').value;
            const u = document.getElementById('new-url').value;
            if(n && u) {
                works.push({ id: Date.now(), name: n, img: u });
                sync();
                document.getElementById('new-title').value = '';
                document.getElementById('new-url').value = '';
            }
        }

        function del(id) {
            if(confirm("Delete?")) { works = works.filter(w => w.id !== id); sync(); }
        }

        function sync() {
            localStorage.setItem('sarthak_final_final', JSON.stringify(works));
            draw();
        }

        function view(name, img) {
            document.getElementById('m-title').innerText = name;
            document.getElementById('m-img').src = img;
            document.getElementById('m-link').href = `https://t.me/SensieSarthak?text=Hi Sarthak, I saw "${name}" and want to order!`;
            document.getElementById('modal-view').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeMe() {
            document.getElementById('modal-view').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
            </html>
